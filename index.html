<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>🌟 Học Cùng Bé — Tiếng Anh & Toán</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@600;700;800&family=Nunito:wght@700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Nunito', system-ui, sans-serif;
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 28px; padding: 24px;
      background: linear-gradient(160deg, #a8edea 0%, #fed6e3 100%);
      text-align: center;
    }
    h1 {
      font-family: 'Baloo 2', sans-serif;
      font-size: clamp(28px, 6vw, 44px);
      color: #2b2b6b; text-shadow: 0 2px 0 #fff;
    }
    p.sub { color: #444; font-size: clamp(15px, 3.5vw, 18px); margin-top: -12px; }
    .cards { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; width: 100%; max-width: 720px; }
    a.card {
      flex: 1 1 260px; max-width: 320px;
      text-decoration: none; color: #fff;
      border-radius: 24px; padding: 32px 24px;
      box-shadow: 0 10px 30px rgba(0,0,0,.15);
      transition: transform .15s ease, box-shadow .15s ease;
      display: flex; flex-direction: column; align-items: center; gap: 10px;
    }
    a.card:active { transform: scale(.97); }
    a.card:hover { transform: translateY(-4px); box-shadow: 0 16px 40px rgba(0,0,0,.22); }
    .card .emoji { font-size: 56px; }
    .card .title { font-family: 'Baloo 2', sans-serif; font-size: 26px; font-weight: 800; }
    .card .desc { font-size: 15px; opacity: .95; }
    .en  { background: linear-gradient(145deg, #ff9a9e, #f6416c); }
    .en2 { background: linear-gradient(145deg, #43cea2, #185a9d); }
    .math{ background: linear-gradient(145deg, #f7971e, #ffd200); color:#5a3d00; }
    footer { color:#555; font-size:13px; margin-top:8px; }
  </style>
</head>
<body>
  <h1>🌟 Học Cùng Bé</h1>
  <p class="sub">Chọn ứng dụng bé muốn học nhé!</p>
  <div class="cards">
    <a class="card en" href="./english-app/index.html">
      <span class="emoji">🐣</span>
      <span class="title">Tiếng Anh Cho Bé</span>
      <span class="desc">Học từ vựng có giọng đọc (mầm non)</span>
    </a>
    <a class="card en2" href="./quiz.html">
      <span class="emoji">📚</span>
      <span class="title">English Fun 4</span>
      <span class="desc">Trắc nghiệm tiếng Anh lớp 4</span>
    </a>
    <a class="card math" href="./toan3.html">
      <span class="emoji">🔢</span>
      <span class="title">Toán Lớp 3</span>
      <span class="desc">Luyện toán vui</span>
    </a>
  </div>
  <footer>Chạm vào thẻ để mở ứng dụng • Bật loa để nghe giọng đọc</footer>
</body>
</html>
